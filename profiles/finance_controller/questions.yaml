# ── Test Cases for Finance_Controller Agent ───────────────────────────
# Workspace: CDR - Demo Finance Fabric
# Semantic Model: SM_Finance
#
# Expected answers based on actual model data (FY2025).
# Revenue ~1.7B EUR, OpEx ~712M, COGS ~692M, Gross Profit ~1B, EBITDA ~984M
#
# match_type options: contains, numeric, exact, regex, any_of
# tolerance: for numeric only (absolute value)
# tags: labels for --tag filtering and report grouping

test_cases:

  # ── P&L / KPIs ──

  - question: "what are the main financial KPIs"
    expected: "Revenue"
    match_type: "contains"
    tags: ["overview", "pnl"]

  - question: "what is the total revenue"
    expected: "1695514236"
    match_type: "numeric"
    tolerance: 1000000
    tags: ["kpi", "revenue"]

  - question: "what is the total expenses"
    expected: "711"
    match_type: "contains"
    tags: ["kpi", "expenses"]

  - question: "what is the net profit margin"
    expected: "57"
    match_type: "numeric"
    tolerance: 5
    tags: ["kpi", "profitability"]

  - question: "what is the gross margin percentage"
    expected: "59"
    match_type: "numeric"
    tolerance: 3
    tags: ["kpi", "profitability"]

  - question: "show the consolidated P&L"
    expected: "Revenue"
    match_type: "contains"
    tags: ["pnl", "overview"]

  # ── Time Intelligence ──

  - question: "what is the revenue trend over the last 12 months"
    expected: ~
    match_type: "contains"
    tags: ["time_intelligence", "revenue"]

  - question: "compare revenue year over year"
    expected: ~
    match_type: "contains"
    tags: ["time_intelligence", "yoy"]

  # ── Cost & Budget ──

  - question: "what are the top expense categories"
    expected: "Achats"
    match_type: "contains"
    tags: ["expenses", "ranking"]

  - question: "what is the budget variance"
    expected: ~
    match_type: "contains"
    tags: ["budget"]

  - question: "which cost centers exceeded their budget"
    expected: "Marketing"
    match_type: "contains"
    tags: ["budget", "cost_center"]

  # ── Rankings / Breakdowns ──

  - question: "top 5 departments by spend"
    expected: "Professional Services"
    match_type: "contains"
    tags: ["ranking", "departments"]

  - question: "which cost center has the highest operating expenses"
    expected: "Professional Services"
    match_type: "contains"
    tags: ["ranking", "cost_center"]

  - question: "which product category generates the most revenue"
    expected: "professional"
    match_type: "contains"
    tags: ["ranking", "products"]

  # ── Cash Flow / DSO ──

  - question: "what is the DSO"
    expected: "32"
    match_type: "numeric"
    tolerance: 15
    tags: ["cash", "dso"]

  # ── Margin Analysis ──

  - question: "what product category has the best gross margin"
    expected: "margin"
    match_type: "contains"
    tags: ["margin", "products"]

  - question: "compare gross margin by customer segment"
    expected: "enterprise"
    match_type: "contains"
    tags: ["margin", "customers"]

  # ── Cross-Domain ──

  - question: "show profitability by cost center"
    expected: "Sales"
    match_type: "contains"
    tags: ["cross_domain", "profitability"]
